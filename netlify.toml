[build]
  # Directory containing the site files
  publish = "idea_cards"

  # No build command needed since this is static HTML
  command = ""

# Serve static files first, then fallback to index.html for SPA routes
[[redirects]]
  from = "/one-pager.html"
  to = "/one-pager.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
